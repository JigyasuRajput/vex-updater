name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12']

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-dev.txt
        pip install -e .
    
    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 vex_generate_tool/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 vex_generate_tool/ tests/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    
    - name: Check code formatting with Black
      run: |
        black --check vex_generate_tool/ tests/
    
    - name: Check import sorting with isort
      run: |
        isort --check-only vex_generate_tool/ tests/
    
    - name: Type check with mypy
      run: |
        mypy vex_generate_tool/ --ignore-missing-imports
    
    - name: Test with pytest
      run: |
        pytest --cov=vex_generate_tool --cov-report=xml --cov-report=term-missing
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  integration-test:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -e .
    
    - name: Run integration tests
      run: |
        # Test CLI help
        vex-generate-tool --help
        vex-generate-tool --version
        
        # Test with sample input
        vex-generate-tool --cve-bin-json sample_input.json \
          --vuln-id CVE-2021-44228 \
          --status not_affected \
          --justification vulnerable_code_not_present \
          --output test_output.json
        
        # Verify output file was created and is valid JSON
        test -f test_output.json
        python -m json.tool test_output.json > /dev/null
        
        # Test stdout output
        vex-generate-tool --cve-bin-json sample_input.json \
          --vuln-id CVE-2021-44228 \
          --status affected | python -m json.tool > /dev/null
        
        # Test error cases
        ! vex-generate-tool --cve-bin-json sample_input.json \
          --vuln-id CVE-2021-44228 \
          --status not_affected
        
        ! vex-generate-tool --cve-bin-json nonexistent.json \
          --vuln-id CVE-2021-44228 \
          --status affected
    
    - name: Run comprehensive examples
      run: |
        chmod +x examples.sh
        ./examples.sh
